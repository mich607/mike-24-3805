<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kamikaze Cars</title>
    <link rel="stylesheet" href="ABOUT.css">
    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
            text-align: center;
        }
        <h1 colo>high</>h1>
        header {
            padding: 20px;
            background-color: #222;
        }
        header h1 {
            margin: 0;
            font-size: 2em;
        }
        nav {
            margin: 20px 0;
        }
        nav button {
            background-color: #ff0055;
            color: #fff;
            border: none;
            padding: 10px 20px;
            margin: 0 10px;
            font-size: 1em;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }
        nav button:hover {
            background-color: #ff66aa;
        }
        table {
            margin: 0 auto;
            border-collapse: collapse;
            width: 90%;
        }
        td {
            border: 2px solid #444;
            padding: 10px;
        }
        img {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: 10px;
        }
        iframe {
            width: 100%;
            max-width: 300px;
            height: 170px;
            border-radius: 10px;
        }
        footer {
            margin-top: 40px;
            padding: 20px;
            background-color: #222;
        }
    </style>
</head>
<body>
    <header>
        <h1>Kamikaze Cars</h1>
        <nav>
            <button onclick="location.href='home.html'">Home</button>
            <button onclick="location.href='#gallery'">Gallery</button>
        </nav>
    </header>

    <!-- Home Section -->
    <section id="home">
        <h2>Welcome to Kamikaze Cars</h2>
        <p>Check out some amazing cars and videos below!</p>
    </section>

    <!-- Gallery Section -->
    <section id="gallery">
        <h2>Car Gallery</h2>
        <table>
            <tr>
                <td>
                    <img src="pic/3.jpg" alt="Ferrari 488 Pista">
                    <p>Ferrari 488 Pista</p>
                </td>
                <td>
                    <img src="pic/2.jpg" alt="Lamborghini Huracan Evo">
                    <p>Lamborghini Huracan Evo</p>
                </td>
                <td>
                    <img src="pic/1.jpg" alt="McLaren 720S">
                    <p>McLaren 720S</p>
                </td>
            </tr>
            <tr>
                <td>
                    <iframe src="https://youtu.be/TrbTHgzBi24" title="Ferrari 488 Pista Video" allowfullscreen></iframe>
                </td>
                <td>
                    <iframe src="https://youtu.be/tYSo0LsHhvo" title="Lamborghini Huracan Video" allowfullscreen></iframe>
                </td>
                <td>
                    <iframe src="https://youtu.be/t9-cMiEDNyk" title="McLaren 720S Video" allowfullscreen></iframe>
                </td>
            </tr>
        </table>
    </section>
     <a href="home.html">Back Home</a>

    <footer>
        &copy; 2026 Kamikaze Cars. All rights reserved.
    </footer>
</body>
</html>
